<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | WauPiura</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1.5rem;"><span>Wau</span>Piura</a>
    <h2>Crea tu cuenta</h2>
    <p>Únete para poder adoptar.</p>
    <form class="auth-form">
      <input type="text" placeholder="Nombre completo" class="auth-input" required>
      <input type="email" placeholder="Correo electrónico" class="auth-input" required>
      <input type="password" placeholder="Contraseña" class="auth-input" required>
      <button type="submit" class="btn-register">Registrarse</button>
    </form>
    <p style="margin-top: 1.5rem; font-size: 0.9rem;">
      ¿Ya tienes cuenta? <a href="iniciar-sesion.html">Inicia sesión</a>
    </p>
  </div>
</body>
</html>
