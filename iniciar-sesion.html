<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | WauPiura</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body" style="background: #E9F5EF;">
  <div class="auth-card">
    <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1.5rem;"><span>Wau</span>Piura</a>
    <h2>¡Bienvenido!</h2>
    <p>Ingresa tus credenciales.</p>
    <form class="auth-form">
      <input type="email" placeholder="Correo electrónico" class="auth-input" required>
      <input type="password" placeholder="Contraseña" class="auth-input" required>
      <button type="submit" class="btn-register" style="background: var(--verde-menta-oscuro);">Entrar</button>
    </form>
    <p style="margin-top: 1.5rem; font-size: 0.9rem;">
      ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
    </p>
  </div>
</body>
</html>
